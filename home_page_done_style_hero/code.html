<script>
        // Simple micro-interaction for the floating books
        document.addEventListener('mousemove', (e) => {
            const books = document.querySelectorAll('.perspective-1000 img');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            
            books.forEach((book, index) => {
                const factor = (index + 1) * 0.5;
                book.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
            });
        });
    </script>
